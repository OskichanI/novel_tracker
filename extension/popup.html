<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NovelTracker</title>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #0f0f13;
        color: #e8e8f0;
        width: 300px;
        min-height: 200px;
        padding: 16px;
        display: flex;
        flex-direction: column;
        gap: 12px;
      }

      /* Header */
      h1 {
        font-size: 15px;
        font-weight: 700;
        color: #a78bfa;
        letter-spacing: 0.5px;
      }

      /* Info rows */
      .info-block {
        background: #1a1a24;
        border-radius: 10px;
        padding: 12px 14px;
        display: flex;
        flex-direction: column;
        gap: 8px;
      }

      .info-row {
        display: flex;
        justify-content: space-between;
        align-items: baseline;
        gap: 8px;
      }

      .info-row .label {
        font-size: 11px;
        text-transform: uppercase;
        letter-spacing: 0.6px;
        color: #6b7280;
        flex-shrink: 0;
      }

      .info-row .value {
        font-size: 13px;
        color: #e8e8f0;
        text-align: right;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        max-width: 180px;
      }

      .value.dim {
        color: #4b5563;
        font-style: italic;
      }

      /* Save button */
      #btn-save {
        background: #7c3aed;
        color: #fff;
        border: none;
        border-radius: 10px;
        padding: 14px;
        font-size: 15px;
        font-weight: 600;
        cursor: pointer;
        width: 100%;
        transition:
          background 0.15s,
          transform 0.1s;
        letter-spacing: 0.3px;
      }

      #btn-save:active {
        transform: scale(0.97);
      }
      #btn-save:hover {
        background: #6d28d9;
      }
      #btn-save:disabled {
        background: #2d2d3a;
        color: #4b5563;
        cursor: default;
        transform: none;
      }

      /* Status badge */
      #status {
        text-align: center;
        font-size: 13px;
        font-weight: 500;
        border-radius: 8px;
        padding: 8px 12px;
        display: none;
      }

      #status.show {
        display: block;
      }
      #status.saved {
        background: #14532d;
        color: #86efac;
      }
      #status.exists {
        background: #1e3a5f;
        color: #93c5fd;
      }
      #status.error {
        background: #450a0a;
        color: #fca5a5;
      }
      #status.loading {
        background: #1a1a24;
        color: #9ca3af;
      }

      /* Not a chapter state */
      #not-chapter {
        text-align: center;
        color: #4b5563;
        font-size: 13px;
        padding: 8px 0;
        display: none;
      }
    </style>
  </head>
  <body>
    <h1>📖 NovelTracker</h1>

    <div class="info-block">
      <div class="info-row">
        <span class="label">Site</span>
        <span class="value dim" id="site">—</span>
      </div>
      <div class="info-row">
        <span class="label">Novel</span>
        <span class="value dim" id="novel">—</span>
      </div>
      <div class="info-row">
        <span class="label">Chapter</span>
        <span class="value dim" id="chapter">—</span>
      </div>
    </div>

    <p id="not-chapter">Not a chapter page</p>

    <button id="btn-save" disabled>Save Chapter</button>

    <div id="status"></div>

    <script src="popup.js"></script>
  </body>
</html>
